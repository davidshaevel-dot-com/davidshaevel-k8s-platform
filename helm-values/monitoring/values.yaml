# kube-prometheus-stack Helm values for AKS.
# Chart: prometheus-community/kube-prometheus-stack
# Reference: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# Grafana — ClusterIP, accessed via Teleport.
grafana:
  service:
    type: ClusterIP
  adminPassword: "admin"
  persistence:
    enabled: true
    size: 1Gi
  # Allow Teleport app proxy origin — Grafana's CSRF check rejects requests
  # when the origin (grafana.teleport.davidshaevel.com) doesn't match the
  # internal hostname. Setting root_url and allowing the Teleport domain fixes this.
  grafana.ini:
    server:
      root_url: https://grafana.teleport.davidshaevel.com
    security:
      cookie_secure: true
      cookie_samesite: none
      csrf_trusted_origins: grafana.teleport.davidshaevel.com

# Prometheus — keep defaults, adjust retention for dev cluster.
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# Node exporter — enabled by default, provides node-level metrics.
nodeExporter:
  enabled: true

# kube-state-metrics — enabled by default, provides K8s object metrics.
kubeStateMetrics:
  enabled: true

# Alertmanager — disable for now (no alert destinations configured).
alertmanager:
  enabled: false
