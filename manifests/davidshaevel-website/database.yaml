apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: davidshaevel-website
  labels:
    app: davidshaevel-website
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: davidshaevel-website
      component: database
  template:
    metadata:
      labels:
        app: davidshaevel-website
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: davidshaevel
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: davidshaevel-website
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: davidshaevel-website
  labels:
    app: davidshaevel-website
    component: database
spec:
  type: ClusterIP
  selector:
    app: davidshaevel-website
    component: database
  ports:
    - port: 5432
      targetPort: 5432
