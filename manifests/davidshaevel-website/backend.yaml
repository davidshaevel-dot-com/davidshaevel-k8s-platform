apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: davidshaevel-website
  labels:
    app: davidshaevel-website
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: davidshaevel-website
      component: backend
  template:
    metadata:
      labels:
        app: davidshaevel-website
        component: backend
    spec:
      containers:
        - name: backend
          image: k8sdevplatformacr.azurecr.io/davidshaevel-website/backend:b80f6d5
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: davidshaevel-website
  labels:
    app: davidshaevel-website
    component: backend
spec:
  type: ClusterIP
  selector:
    app: davidshaevel-website
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
